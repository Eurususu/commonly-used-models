# config/model/custom_net.yaml
model:
  name: "dynamic_graph_model"  # 我们即将编写的通用容器模型
  kwargs:
    # 按照顺序定义你想拼装的 Layer
    layers_cfg:
      - name: "DoubleConv"
        from: "input"
        args: {"in_channels": 3, "out_channels": 64} # [0] 输出

      - name: "Down"
        from: -1
        args: {"in_channels": 64, "out_channels": 64} # [1] 输出

      - name: "Up"
        from: [-1, 0]
        args: {"in_channels": 128, "out_channels": 64, "bilinear": True} # [2] 输出

      - name: "Conv2d"
        from: -1
        args: {"in_channels": 64, "out_channels": 64, "kernel_size": 3, "padding": 1} # [3] 输出

      - name: "Add"
        from: [-1, 0]
        args: {}

      - name: "OutConv"
        from: -1
        args: {"in_channels": 64, "out_channels": 1}