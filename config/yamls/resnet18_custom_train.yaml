data:
  train_transforms: [
      {"name": "resize", "kwargs": {"size": [224, 224]}},
      {"name": "random_horizontal_flip", "kwargs": {"p": 0.5}},
      # {"name": "color_jitter", "kwargs": {"brightness": 0.2, "contrast": 0.2, "saturation": 0.2, "hue": 0.1}},
      {"name": "to_tensor", "kwargs": {}},
      {"name": "normalize", "kwargs": {"mean": [0.485, 0.456, 0.406], "std": [0.229, 0.224, 0.225]}}
    ]
  
  train_dataset:
    name: "cls_dataset"
    kwargs:
      data_dir: "./dummy_imagenet/train"

  val_transforms: [
      {"name": "resize", "kwargs": {"size": [224, 224]}},
      {"name": "to_tensor", "kwargs": {}},
      {"name": "normalize", "kwargs": {"mean": [0.485, 0.456, 0.406], "std": [0.229, 0.224, 0.225]}}
    ]

  val_dataset:
    name: "cls_dataset"
    kwargs:
      data_dir: "./dummy_imagenet/val"

  train_loader:
    batch_size: 16
    shuffle: true
    num_workers: 8


  val_loader:
    batch_size: 16
    shuffle: false
    num_workers: 8

model: 
  name: "dynamic_graph_model"
  kwargs:
    layers_cfg:
      - name: "Conv2d"
        from: "input"
        args: {"in_channels": 3, "out_channels": 64, "kernel_size": 7, "padding": 3, "stride": 2, "bias": False}
      - name: "BatchNorm2d"
        from: -1
        args: {"num_features": 64}
      - name: "ReLU"
        from: -1
        args: {inplace: True}
      - name: "MaxPool2d"
        from: -1
        args: {"kernel_size": 3, "stride": 2, "padding": 1}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 64, "out_channels": 64, "stride": 1}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 64, "out_channels": 64, "stride": 1}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 64, "out_channels": 128, "stride": 2}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 128, "out_channels": 128, "stride": 1}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 128, "out_channels": 256, "stride": 2}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 256, "out_channels": 256, "stride": 1}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 256, "out_channels": 512, "stride": 2}
      - name: "BasicBlock"
        from: -1
        args: {"in_channels": 512, "out_channels": 512, "stride": 1}
      - name: "AdaptiveAvgPool2d"
        from: -1
        args: {"output_size": [1, 1]}
      - name: "Flatten"
        from: -1
        args: {"start_dim": 1}
      - name: "Linear"
        from: -1
        args: {"in_features": 512, "out_features": 3}
      

  

optim: 
  name: "adamw"
  kwargs: 
    lr: 0.001
    weight_decay: 0.0001

scheduler: 
  name: "cosine_annealing"
  kwargs:
    T_max: 50 # 50个 epoch 降到最低点
    eta_min: 1.0e-5 # 最低学习率


loss:
  name: "crossentropyloss"
  kwargs: {}

